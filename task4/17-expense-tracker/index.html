<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
</head>
<body>
    <h2>Expense Tracker</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Category</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody id="expenseTable"></tbody>
    </table>
    <h3>Category Totals</h3>
    <div id="categoryTotals"></div>
    <div id="grandTotal"></div>
    <script>
        let expenses=[
            {category:"Food", amount:200},
            {category: "Travel", amount:500},
            {category: "Food", amount: 300}
        ];
        let table=document.getElementById('expenseTable');
        let total={};
        let grandTotal=0;
        for(let i=0;i<expenses.length;i++){
            let row="<tr><td>" + expenses[i].category +"</td><td>"+expenses[i].amount +"</td></tr>";
            table.innerHTML+=row;
            let cat=expenses[i].category;
            let amt=expenses[i].amount;
            if(!total[cat]){
                total[cat]=0;
            }
            total[cat]+=amt;
            grandTotal+=amt;
        }
        let output="";
        for(let key in total) {
            output +=key + ": Rs."+total[key] + "<br>";
        }
        document.getElementById('categoryTotals').innerHTML=output;
        document.getElementById('grandTotal').innerHTML="Grand Total: Rs."+grandTotal;
        
    </script>
</body>
</html>
