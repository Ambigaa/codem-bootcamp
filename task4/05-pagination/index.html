<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Pagination</title>
    <style>
        body {
            background-color: aliceblue;
        }
        #items {
            margin:20px;
            font-size: large;
            
        }
        button {
            padding:3px 7px;
            margin:5px;
            border:1px solid black;
            border-radius:3px;
            background-color: antiquewhite;
            font-size: medium;
            
        }
    </style>
</head>
<body>
    <h2>Manual Pagination</h2>
    <div id="items"></div>
    <button onclick="prevPage()" id="prevBtn">Previous</button>
    <button onclick="nextPage()" id="nextBtn">Next</button>
    <script>
        let allItems=[];
        for(let i=1;i<=20;i++){
        allItems.push(i);
        }
        let currentPage=1;
        let itemsPerPage=5;
        function render(){
            let displayEl=document.getElementById('items');
            displayEl.innerHTML="";
            let start=(currentPage-1)*itemsPerPage;
            let end=start+itemsPerPage;
            for(let i=start;i<end && i<allItems.length;i++) {
                displayEl.innerHTML+=allItems[i] + " ";
            }
            document.getElementById('prevBtn').disabled=(currentPage===1);
            document.getElementById('nextBtn').disabled=(currentPage===Math.ceil(allItems.length/itemsPerPage));

        }
        function nextPage(){
            currentPage++;
            render();
        }
        function prevPage(){
            currentPage--;
            render();
        }
        render();
    </script>

</body>
</html>
