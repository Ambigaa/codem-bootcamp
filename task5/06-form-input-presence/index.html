<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation - Input Presence Check</title>
    <style>
        
    </style>
</head>
<body>
    <h2>Form Validation - Input Presence Check</h2>
    <form onsubmit="validateInput(event)">
        <label>Username:</label>
        <input id="name" placeholder="Enter your name"><br><br>
        <label>Email:</label>
        <input id="email" placeholder="Enter your email"><br><br>
        <button id="btn" type="submit"  >Submit</button>
    </form>
    <script>
        let nameEl=document.getElementById('name');
        let emailEl=document.getElementById('email');
        let btnEl=document.getElementById('btn');
        function validateInput(event) {
            event.preventDefault();
            
            if(nameEl.value==="" || emailEl.value==="" ){
                console.log("The input fields cannot be empty!");
                return
            }
            console.log("Form submitted successfully");
            
        }
    </script>
</body>
</html>
