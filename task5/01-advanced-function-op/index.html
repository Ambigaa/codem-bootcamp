<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Function Operations</title>
</head>
<body>
    <script>
        function calculateSum(a,b) {
            return a+b;
        }
        function calculateProduct(a,b) {
            return a*b;
        }
        let sumResult=calculateSum(22,19);
        let productResult=calculateProduct(5,8);
        console.log("Sum Result:"+sumResult);
        console.log("Product Result:"+ productResult);
    </script>
</body>
</html>
