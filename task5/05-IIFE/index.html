<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immediately Invoked Function Expression</title>
</head>
<body>
    <script>
        (function () {
            let number=22;
            let result= number+number;
            console.log("Result from IIFE: "+result);
        }) ();
    </script>
</body>
</html>
